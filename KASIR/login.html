<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Putra Print</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:      #f1f5f9;
            --bg-surface:   #ffffff;
            --border:       rgba(15,23,42,0.09);
            --text:         #0f172a;
            --text-muted:   #94a3b8;
            --text-sec:     #475569;
            --accent:       #e67e00;
            --accent-hover: #c96d00;
            --emerald:      #059669;
            --emerald-h:    #047857;
            --rose:         #e11d48;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi lingkaran latar */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(230,126,0,0.07) 0%, transparent 70%);
            top: -100px; right: -100px;
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(5,150,105,0.07) 0%, transparent 70%);
            bottom: -80px; left: -80px;
            border-radius: 50%;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.2) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ─── Header ─── */
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 76px; height: 76px;
            background: linear-gradient(135deg, var(--accent), var(--emerald));
            border-radius: 22px;
            margin-bottom: 16px;
            box-shadow: 0 8px 28px rgba(230,126,0,0.22);
        }

        .logo-wrap i { font-size: 1.9rem; color: white; }

        .login-header h1 {
            font-size: 1.55rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.4px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* ─── Card ─── */
        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 34px 32px;
            box-shadow:
                0 1px 2px rgba(15,23,42,0.04),
                0 8px 32px rgba(15,23,42,0.08),
                0 24px 64px rgba(15,23,42,0.05);
        }

        /* ─── Form ─── */
        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 7px;
        }

        .input-wrap { position: relative; }

        .input-wrap .icon-left {
            position: absolute;
            left: 13px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.82rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap:focus-within .icon-left { color: var(--accent); }

        .input-wrap input {
            width: 100%;
            background: var(--bg-base);
            border: 1.5px solid var(--border);
            border-radius: 11px;
            padding: 11px 14px 11px 38px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .input-wrap input::placeholder { color: var(--text-muted); }

        .input-wrap input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(230,126,0,0.12);
        }

        .toggle-pw {
            position: absolute;
            right: 13px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.82rem;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--text-sec); }

        /* ─── Error ─── */
        #error-msg {
            display: none;
            background: #fff1f2;
            border: 1px solid rgba(225,29,72,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--rose);
            font-size: 0.82rem;
            margin-bottom: 18px;
            text-align: center;
        }

        /* ─── Button ─── */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent) 0%, #f59e0b 100%);
            border: none;
            border-radius: 11px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(230,126,0,0.28);
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(230,126,0,0.38);
            background: linear-gradient(135deg, var(--accent-hover) 0%, #e67e00 100%);
        }

        .btn-login:active:not(:disabled) { transform: translateY(0); }

        .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

        .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        /* ─── Divider ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── Info tag ─── */
        .info-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f0fdf4;
            border: 1px solid rgba(5,150,105,0.15);
            border-radius: 10px;
            padding: 9px 14px;
            font-size: 0.78rem;
            color: var(--emerald);
            font-weight: 600;
        }

        /* ─── Footer ─── */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.76rem;
            color: var(--text-muted);
        }

        .login-footer .brand {
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    <div class="login-header">
        <div class="logo-wrap">
            <i class="fa-solid fa-print"></i>
        </div>
        <h1>Putra Print</h1>
        <p>Masuk untuk mengakses sistem kasir</p>
    </div>

    <div class="login-card">

        <div id="error-msg">
            <i class="fa-solid fa-circle-exclamation me-1"></i>
            <span id="error-text">Email atau password salah.</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-envelope icon-left"></i>
                    <input type="email" id="login-email"
                        placeholder="contoh@email.com"
                        required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="login-password"
                        placeholder="••••••••"
                        required autocomplete="current-password">
                    <i class="toggle-pw fa-solid fa-eye" id="toggle-pw-icon" onclick="togglePassword()"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-login">
                <div class="spinner"></div>
                <span class="btn-text">
                    <i class="fa-solid fa-right-to-bracket"></i>&nbsp; Masuk Sekarang
                </span>
            </button>

        </form>

        <div class="divider">Akses Toko</div>

        <div class="info-tag">
            <i class="fa-solid fa-shield-halved"></i>
            Sistem kasir dilindungi Firebase Authentication
        </div>

    </div>

    <div class="login-footer">
        Putra Print &copy; 2026 &nbsp;·&nbsp; Powered by <span class="brand">Firebase</span>
    </div>
</div>

<script type="module">
    import { auth } from './js/firebase-init.js';
    import { loginUser } from './js/auth.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Jika sudah login, langsung masuk
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.replace('index.html');
    });

    window.handleLogin = async function(e) {
        e.preventDefault();
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn      = document.getElementById('btn-login');
        const errBox   = document.getElementById('error-msg');
        const errText  = document.getElementById('error-text');

        errBox.style.display = 'none';
        btn.classList.add('loading');
        btn.disabled = true;

        try {
            await loginUser(email, password);
        } catch (err) {
            btn.classList.remove('loading');
            btn.disabled = false;

            let msg = 'Terjadi kesalahan. Coba lagi.';
            if (['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(err.code)) {
                msg = 'Email atau password salah. Coba lagi.';
            } else if (err.code === 'auth/too-many-requests') {
                msg = 'Terlalu banyak percobaan. Tunggu beberapa menit.';
            } else if (err.code === 'auth/network-request-failed') {
                msg = 'Tidak ada koneksi internet.';
            }

            errText.textContent = msg;
            errBox.style.display = 'block';
        }
    };

    window.togglePassword = function() {
        const input = document.getElementById('login-password');
        const icon  = document.getElementById('toggle-pw-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    };
</script>

</body>
</html>
