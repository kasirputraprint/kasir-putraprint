<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Putra Print Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: rgba(255,255,255,0.08);
            --emerald: #10b981;
            --emerald-dark: #059669;
            --rose: #f43f5e;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --glow: rgba(16, 185, 129, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Glow blob */
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -60%);
            z-index: 0;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo / Header */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--emerald), #0ea5e9);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 0 40px rgba(16,185,129,0.3);
        }

        .login-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px 12px 40px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-wrap input::placeholder { color: var(--text-muted); }

        .input-wrap input:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
        }

        .input-wrap input:focus + i,
        .input-wrap:focus-within i {
            color: var(--emerald);
        }

        /* Password toggle */
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            pointer-events: all;
            z-index: 2;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--text); }

        /* Error */
        #error-msg {
            display: none;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--rose);
            font-size: 0.82rem;
            margin-bottom: 18px;
            text-align: center;
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(16,185,129,0.35);
        }

        .btn-login:active:not(:disabled) { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-login .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .login-footer span { color: var(--emerald); font-weight: 600; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-header">
        <div class="logo-icon">
            <i class="fa-solid fa-print"></i>
        </div>
        <h1>Putra Print Studio</h1>
        <p>Masuk untuk mengakses sistem kasir</p>
    </div>

    <div class="login-card">
        <div id="error-msg">
            <i class="fa-solid fa-circle-exclamation me-1"></i>
            <span id="error-text">Email atau password salah.</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <input type="email" id="login-email" placeholder="contoh@email.com" required autocomplete="email">
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                    <i class="fa-solid fa-lock"></i>
                    <i class="toggle-pw fa-solid fa-eye" id="toggle-pw-icon" onclick="togglePassword()"></i>
                </div>
            </div>

            <div id="error-msg" style="display:none;"></div>

            <button type="submit" class="btn-login" id="btn-login">
                <div class="spinner"></div>
                <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> &nbsp;Masuk Sekarang</span>
            </button>
        </form>
    </div>

    <div class="login-footer">
        Putra Print Studio &copy; 2026 &nbsp;·&nbsp; Powered by <span>Firebase</span>
    </div>
</div>

<script type="module">
    import { loginUser, requireAuth } from './js/auth.js';

    // Jika sudah login, langsung masuk ke aplikasi
    import { auth } from './js/firebase-init.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.replace('index.html');
        }
    });

    // Handle login form
    window.handleLogin = async function(e) {
        e.preventDefault();

        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('btn-login');
        const errBox = document.getElementById('error-msg');
        const errText = document.getElementById('error-text');

        // Hide error & show loading
        errBox.style.display = 'none';
        btn.classList.add('loading');
        btn.disabled = true;

        try {
            await loginUser(email, password);
            // Berhasil — onAuthStateChanged akan redirect ke index.html
        } catch (err) {
            btn.classList.remove('loading');
            btn.disabled = false;

            let msg = 'Terjadi kesalahan. Coba lagi.';
            if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                msg = 'Email atau password salah. Coba lagi.';
            } else if (err.code === 'auth/too-many-requests') {
                msg = 'Terlalu banyak percobaan. Tunggu beberapa menit.';
            } else if (err.code === 'auth/network-request-failed') {
                msg = 'Tidak ada koneksi internet.';
            }

            errText.textContent = msg;
            errBox.style.display = 'block';
        }
    };

    // Toggle password visibility
    window.togglePassword = function() {
        const input = document.getElementById('login-password');
        const icon = document.getElementById('toggle-pw-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    };
</script>

</body>
</html>
